kind = "web"
previewPath = "/"
title = "Class Portfolios"
version = "1.0.0"
id = "artifacts/class-portfolios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24766

[services.development]
run = "pnpm --filter @workspace/class-portfolios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/class-portfolios", "run", "build" ]
publicDir = "artifacts/class-portfolios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24766"
BASE_PATH = "/"
